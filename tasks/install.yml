---
- name: Install dependencies
  become: true
  community.general.pacman:
    name:
      - base-devel
      - git

- name: Clone yay from github
  become: false
  ansible.builtin.git:
    repo: https://aur.archlinux.org/yay.git
    dest: /tmp/yay
    version: master
  tags:
    - yay

- name: Build and install yay with makepkg
  become: false
  ansible.builtin.command: makepkg --noconfirm -si
  args:
    chdir: /tmp/yay
    creates: /usr/bin/yay
  tags:
    - yay

- name: Install packages from AUR
  become: true
  yay:
    name: "{{ item }}"
  loop: "{{ aur_packages }}"
  when: aur_packages | length > 0
