---
- name: Update pacman cache
  become: true
  community.general.pacman:
    update_cache: true
  changed_when: false
  when: ansible_os_family == 'Archlinux'

- name: Install dependencies
  become: true
  community.general.pacman:
    name:
      - base-devel
      - git
    state: present
  when: ansible_os_family == 'Archlinux'

- name: Clone yay from github
  become: false
  ansible.builtin.git:
    repo: https://aur.archlinux.org/yay.git
    dest: /tmp/yay
    version: master
    update: true
  tags:
    - yay
  when: ansible_os_family == 'Archlinux'

- name: Build and install yay with makepkg
  become: false
  ansible.builtin.command: makepkg --noconfirm -si
  args:
    chdir: /tmp/yay
    creates: /usr/bin/yay
  tags:
    - yay
  when: ansible_os_family == 'Archlinux'

- name: Install packages from AUR
  become: true
  yay:
    name: "{{ item }}"
    state: present
  loop: "{{ aur_packages }}"
  when:
    - aur_packages | length > 0
    - ansible_os_family == 'Archlinux'
